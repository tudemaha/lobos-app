<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout}">

<title>Register — Lobos</title>

<th:block th:fragment="head-extra"></th:block>

<th:block th:fragment="main-content">
<div class="min-h-[calc(100vh-3.5rem-57px)] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm">

        <!-- Heading -->
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-semibold text-gray-900 tracking-tight">Create account</h1>
            <p class="mt-1 text-gray-500 text-base">Start organizing your grammar collections</p>
        </div>

        <!-- Global validation errors -->
        <div th:if="${#fields.hasErrors('*')}" class="mb-4 bg-red-50 border border-red-200 rounded-md px-4 py-3 text-sm text-red-600">
            <ul class="list-disc list-inside space-y-0.5">
                <li th:each="error : ${#fields.allErrors()}" th:text="${error}"></li>
            </ul>
        </div>

        <!-- Registration form -->
        <form th:action="@{/auth/register}"
              th:object="${userRegister}"
              method="post"
              class="space-y-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- First Name -->
            <div>
                <label for="reg-firstName" class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
                <input id="reg-firstName"
                       type="text"
                       th:field="*{firstName}"
                       autocomplete="given-name"
                       placeholder="John"
                       class="w-full border border-gray-300 rounded-md px-3 py-2 text-base text-gray-900 placeholder-gray-400 focus-pastel transition"
                       th:classappend="${#fields.hasErrors('firstName')} ? ' border-red-400' : ''" />
                <span th:if="${#fields.hasErrors('firstName')}"
                      th:errors="*{firstName}"
                      class="text-xs text-red-500 mt-0.5 block"></span>
            </div>

            <!-- Last Name -->
            <div>
                <label for="reg-lastName" class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
                <input id="reg-lastName"
                       type="text"
                       th:field="*{lastName}"
                       autocomplete="family-name"
                       placeholder="Doe"
                       class="w-full border border-gray-300 rounded-md px-3 py-2 text-base text-gray-900 placeholder-gray-400 focus-pastel transition"
                       th:classappend="${#fields.hasErrors('lastName')} ? ' border-red-400' : ''" />
                <span th:if="${#fields.hasErrors('lastName')}"
                      th:errors="*{lastName}"
                      class="text-xs text-red-500 mt-0.5 block"></span>
            </div>

            <!-- Email -->
            <div>
                <label for="reg-email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input id="reg-email"
                       type="email"
                       th:field="*{email}"
                       autocomplete="email"
                       placeholder="you@example.com"
                       class="w-full border border-gray-300 rounded-md px-3 py-2 text-base text-gray-900 placeholder-gray-400 focus-pastel transition"
                       th:classappend="${#fields.hasErrors('email')} ? ' border-red-400' : ''" />
                <span th:if="${#fields.hasErrors('email')}"
                      th:errors="*{email}"
                      class="text-xs text-red-500 mt-0.5 block"></span>
            </div>

            <!-- Password -->
            <div>
                <label for="reg-password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <input id="reg-password"
                           type="password"
                           th:field="*{password}"
                           autocomplete="new-password"
                           placeholder="Min. 8 characters"
                           class="w-full border border-gray-300 rounded-md px-3 py-2 pr-10 text-base text-gray-900 placeholder-gray-400 focus-pastel transition"
                           th:classappend="${#fields.hasErrors('password')} ? ' border-red-400' : ''" />
                    <button type="button"
                            onclick="togglePwd('reg-password')"
                            class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
                <span th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}"
                      class="text-xs text-red-500 mt-0.5 block"></span>
            </div>

            <!-- Confirm Password -->
            <div>
                <label for="reg-confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                <div class="relative">
                    <input id="reg-confirmPassword"
                           type="password"
                           th:field="*{confirmPassword}"
                           autocomplete="new-password"
                           placeholder="Repeat your password"
                           class="w-full border border-gray-300 rounded-md px-3 py-2 pr-10 text-base text-gray-900 placeholder-gray-400 focus-pastel transition"
                           th:classappend="${#fields.hasErrors('confirmPassword')} ? ' border-red-400' : ''" />
                    <button type="button"
                            onclick="togglePwd('reg-confirmPassword')"
                            class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
                <span th:if="${#fields.hasErrors('confirmPassword')}"
                      th:errors="*{confirmPassword}"
                      class="text-xs text-red-500 mt-0.5 block"></span>
            </div>

            <!-- Submit -->
            <button type="submit"
                    id="btn-register"
                    class="btn-primary w-full text-center font-medium mt-2">
                Create Account
            </button>
        </form>

        <!-- Link to login -->
        <p class="mt-6 text-center text-sm text-gray-500">
            Already have an account?
            <a th:href="@{/login}" class="pastel-blue font-medium hover:underline">Sign In</a>
        </p>
    </div>
</div>
</th:block>

<th:block th:fragment="scripts">
<script>
    function togglePwd(inputId) {
        const input = document.getElementById(inputId);
        input.type = input.type === 'password' ? 'text' : 'password';
    }
</script>
</th:block>
</html>
