<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout}">

<title>Login — Lobos</title>

<th:block th:fragment="head-extra"></th:block>

<th:block th:fragment="main-content">
<div class="min-h-[calc(100vh-3.5rem-57px)] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm">

        <!-- Heading -->
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-semibold text-gray-900 tracking-tight">Welcome back</h1>
            <p class="mt-1 text-gray-500 text-base">Sign in to your Lobos account</p>
        </div>

        <!-- Alert for login error -->
        <div th:if="${param.error}" class="mb-4 bg-red-50 border border-red-200 rounded-md px-4 py-3 text-sm text-red-600">
            Invalid email or password. Please try again.
        </div>

        <!-- Alert for logout message -->
        <div th:if="${param.logout}" class="mb-4 bg-green-50 border border-green-200 rounded-md px-4 py-3 text-sm text-green-600">
            You have been logged out successfully.
        </div>

        <!-- Login Form -->
        <form th:action="@{/auth/login}" method="post" class="space-y-5">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- Email -->
            <div>
                <label for="login-email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input id="login-email"
                       type="email"
                       name="email"
                       autocomplete="email"
                       required
                       placeholder="you@example.com"
                       class="w-full border border-gray-300 rounded-md px-3 py-2 text-base text-gray-900 placeholder-gray-400 focus-pastel transition" />
            </div>

            <!-- Password -->
            <div>
                <label for="login-password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <input id="login-password"
                           type="password"
                           name="password"
                           autocomplete="current-password"
                           required
                           placeholder="••••••••"
                           class="w-full border border-gray-300 rounded-md px-3 py-2 pr-10 text-base text-gray-900 placeholder-gray-400 focus-pastel transition" />
                    <button type="button"
                            id="toggle-login-pwd"
                            onclick="togglePwd('login-password', 'eye-icon-login')"
                            class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600">
                        <svg id="eye-icon-login" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit"
                    id="btn-login"
                    class="btn-primary w-full text-center font-medium">
                Sign In
            </button>
        </form>

        <!-- Divider -->
        <p class="mt-6 text-center text-sm text-gray-500">
            Don't have an account?
            <a th:href="@{/register}" class="pastel-blue font-medium hover:underline">Register</a>
        </p>
    </div>
</div>
</th:block>

<th:block th:fragment="scripts">
<script>
    function togglePwd(inputId, iconId) {
        const input = document.getElementById(inputId);
        input.type = input.type === 'password' ? 'text' : 'password';
    }
</script>
</th:block>
</html>
