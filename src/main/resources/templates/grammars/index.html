<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout}">

<title th:text="${collectionName != null} ? ${collectionName} + ' — Lobos' : 'Grammars — Lobos'">Grammars — Lobos</title>

<th:block th:fragment="head-extra"></th:block>

<th:block th:fragment="main-content">
<div class="max-w-5xl mx-auto px-4 sm:px-6 py-10">

    <!-- Breadcrumb -->
    <nav class="text-sm text-gray-400 mb-6">
        <a th:href="@{/collections}" class="hover:text-gray-600 transition">Collections</a>
        <span class="mx-2">/</span>
        <span class="text-gray-700 font-medium" th:text="${collectionName ?: 'Grammars'}">Collection Name</span>
    </nav>

    <!-- Page header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
        <div>
            <h1 class="text-2xl font-semibold text-gray-900" th:text="${collectionName ?: 'Grammars'}">Grammars</h1>
            <p class="text-sm text-gray-500 mt-0.5">Words, meanings, and examples in this collection</p>
        </div>
        <button type="button"
                id="btn-new-grammar"
                onclick="openCreateModal()"
                class="btn-primary whitespace-nowrap self-start sm:self-auto">
            + Add Grammar
        </button>
    </div>

    <!-- Flash messages -->
    <div th:if="${successMessage}" class="mb-5 bg-green-50 border border-green-200 rounded-md px-4 py-3 text-sm text-green-700">
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="mb-5 bg-red-50 border border-red-200 rounded-md px-4 py-3 text-sm text-red-600">
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- Empty state -->
    <div th:if="${grammarList == null or grammarList.grammars.isEmpty()}"
         class="text-center py-20 text-gray-400">
        <svg class="mx-auto w-12 h-12 mb-4 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
        <p class="text-base">No grammar entries yet.</p>
        <p class="text-sm mt-1">Click <strong>+ Add Grammar</strong> to get started.</p>
    </div>

    <!-- Grammar table -->
    <div th:if="${grammarList != null and !grammarList.grammars.isEmpty()}"
         class="overflow-x-auto rounded-xl border border-gray-200">
        <table class="min-w-full bg-white text-sm">
            <thead class="bg-gray-50 border-b border-gray-200">
                <tr>
                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider w-6">&star;</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Word</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider hidden sm:table-cell">Meaning</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider hidden md:table-cell">Added</th>
                    <th class="px-4 py-3 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
                <tr th:each="g : ${grammarList.grammars}"
                    class="hover:bg-gray-50 transition-colors">
                    <!-- Starred -->
                    <td class="px-4 py-3">
                        <form th:action="@{/collections/{cid}/grammars/{gid}(cid=${collectionId},gid=${g.id})}"
                              method="post" class="inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="_method" value="PATCH"/>
                            <button type="submit"
                                    th:id="'btn-star-' + ${g.id}"
                                    class="focus:outline-none"
                                    th:title="${g.starred} ? 'Unstar' : 'Star'">
                                <svg class="w-4 h-4 transition"
                                     th:classappend="${g.starred} ? 'text-yellow-400 fill-yellow-400' : 'text-gray-300'"
                                     fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                                </svg>
                            </button>
                        </form>
                    </td>

                    <!-- Word -->
                    <td class="px-4 py-3 font-medium text-gray-900">
                        <a th:href="@{/collections/{cid}/grammars/{gid}(cid=${collectionId},gid=${g.id})}"
                           class="hover:text-[#70A3C9] transition"
                           th:text="${g.word}">word</a>
                    </td>

                    <!-- Meaning (truncated) -->
                    <td class="px-4 py-3 text-gray-600 hidden sm:table-cell max-w-xs">
                        <span class="line-clamp-2" th:text="${g.meaning}">meaning</span>
                    </td>

                    <!-- Created At -->
                    <td class="px-4 py-3 text-gray-400 hidden md:table-cell whitespace-nowrap"
                        th:text="${g.createdAt != null} ? ${#temporals.format(g.createdAt, 'MMM d, yyyy')} : ''"></td>

                    <!-- Actions -->
                    <td class="px-4 py-3">
                        <div class="flex items-center justify-end gap-1">
                            <!-- View detail -->
                            <a th:href="@{/collections/{cid}/grammars/{gid}(cid=${collectionId},gid=${g.id})}"
                               class="p-1.5 rounded-md text-gray-400 hover:text-[#70A3C9] hover:bg-gray-100 transition"
                               title="View">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                            </a>
                            <!-- Edit -->
                            <button type="button"
                                    th:attr="data-id=${g.id}, data-word=${g.word}, data-meaning=${g.meaning}"
                                    onclick="openEditModal(this)"
                                    class="p-1.5 rounded-md text-gray-400 hover:text-[#70A3C9] hover:bg-gray-100 transition"
                                    title="Edit">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M15.232 5.232l3.536 3.536M9 13l6.586-6.586a2 2 0 112.828 2.828L11.828 15.828a2 2 0 01-1.414.586H9v-1a2 2 0 01.586-1.414z"/>
                                </svg>
                            </button>
                            <!-- Delete -->
                            <button type="button"
                                    th:attr="data-id=${g.id}, data-word=${g.word}"
                                    onclick="confirmDelete(this)"
                                    class="p-1.5 rounded-md text-gray-400 hover:text-red-500 hover:bg-gray-100 transition"
                                    title="Delete">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M9 7V4h6v3M4 7h16"/>
                                </svg>
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div th:if="${grammarList != null and grammarList.pagination.totalPage > 1}"
         class="flex items-center justify-center gap-2 mt-8">
        <a th:if="${grammarList.pagination.page > 1}"
           th:href="@{/collections/{cid}/grammars(cid=${collectionId},page=${grammarList.pagination.page - 1})}"
           class="px-3 py-1.5 text-sm border border-gray-300 rounded-md hover:bg-gray-100 transition">
            &larr; Prev
        </a>
        <span class="px-3 py-1.5 text-sm text-gray-500">
            Page <span th:text="${grammarList.pagination.page}"></span>
            of <span th:text="${grammarList.pagination.totalPage}"></span>
        </span>
        <a th:if="${grammarList.pagination.page < grammarList.pagination.totalPage}"
           th:href="@{/collections/{cid}/grammars(cid=${collectionId},page=${grammarList.pagination.page + 1})}"
           class="px-3 py-1.5 text-sm border border-gray-300 rounded-md hover:bg-gray-100 transition">
            Next &rarr;
        </a>
    </div>
</div>

<!-- ── CREATE GRAMMAR MODAL ── -->
<div id="modal-create-grammar"
     class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/30 px-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6">
        <h2 class="text-xl font-semibold text-gray-900 mb-5">Add Grammar Entry</h2>

        <form th:action="@{/collections/{cid}/grammars(cid=${collectionId})}"
              method="post" class="space-y-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- Word -->
            <div>
                <label for="create-g-word" class="block text-sm font-medium text-gray-700 mb-1">Word <span class="text-red-400">*</span></label>
                <input id="create-g-word"
                       type="text"
                       name="word"
                       required
                       maxlength="100"
                       placeholder="e.g. は (wa)"
                       class="w-full border border-gray-300 rounded-md px-3 py-2 text-base text-gray-900 placeholder-gray-400 focus-pastel transition" />
            </div>

            <!-- Meaning -->
            <div>
                <label for="create-g-meaning" class="block text-sm font-medium text-gray-700 mb-1">Meaning <span class="text-red-400">*</span></label>
                <textarea id="create-g-meaning"
                          name="meaning"
                          required
                          rows="3"
                          placeholder="Describe the meaning or usage…"
                          class="w-full border border-gray-300 rounded-md px-3 py-2 text-base text-gray-900 placeholder-gray-400 focus-pastel transition resize-none"></textarea>
            </div>

            <!-- Example (optional) -->
            <div>
                <label for="create-g-example" class="block text-sm font-medium text-gray-700 mb-1">
                    Example <span class="text-gray-400 font-normal">(optional)</span>
                </label>
                <textarea id="create-g-example"
                          name="example"
                          rows="2"
                          placeholder="e.g. 私は学生です。"
                          class="w-full border border-gray-300 rounded-md px-3 py-2 text-base text-gray-900 placeholder-gray-400 focus-pastel transition resize-none"></textarea>
            </div>

            <div class="flex justify-end gap-3 pt-2">
                <button type="button" onclick="closeCreateModal()" class="btn-outline">Cancel</button>
                <button type="submit" id="btn-create-grammar-submit" class="btn-primary">Add</button>
            </div>
        </form>
    </div>
</div>

<!-- ── EDIT GRAMMAR MODAL ── -->
<div id="modal-edit-grammar"
     class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/30 px-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6">
        <h2 class="text-xl font-semibold text-gray-900 mb-5">Edit Grammar Entry</h2>

        <form id="edit-grammar-form"
              th:action="@{/collections/{cid}/grammars/__(cid=${collectionId})}"
              method="post" class="space-y-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="_method" value="PUT"/>

            <!-- Word -->
            <div>
                <label for="edit-g-word" class="block text-sm font-medium text-gray-700 mb-1">Word <span class="text-red-400">*</span></label>
                <input id="edit-g-word"
                       type="text"
                       name="word"
                       required
                       maxlength="100"
                       class="w-full border border-gray-300 rounded-md px-3 py-2 text-base text-gray-900 placeholder-gray-400 focus-pastel transition" />
            </div>

            <!-- Meaning -->
            <div>
                <label for="edit-g-meaning" class="block text-sm font-medium text-gray-700 mb-1">Meaning <span class="text-red-400">*</span></label>
                <textarea id="edit-g-meaning"
                          name="meaning"
                          required
                          rows="3"
                          class="w-full border border-gray-300 rounded-md px-3 py-2 text-base text-gray-900 placeholder-gray-400 focus-pastel transition resize-none"></textarea>
            </div>

            <!-- Example (optional) -->
            <div>
                <label for="edit-g-example" class="block text-sm font-medium text-gray-700 mb-1">
                    Example <span class="text-gray-400 font-normal">(optional)</span>
                </label>
                <textarea id="edit-g-example"
                          name="example"
                          rows="2"
                          class="w-full border border-gray-300 rounded-md px-3 py-2 text-base text-gray-900 placeholder-gray-400 focus-pastel transition resize-none"></textarea>
            </div>

            <div class="flex justify-end gap-3 pt-2">
                <button type="button" onclick="closeEditModal()" class="btn-outline">Cancel</button>
                <button type="submit" id="btn-edit-grammar-submit" class="btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<!-- DELETE hidden form -->
<form id="delete-grammar-form"
      th:action="@{/collections/{cid}/grammars/__(cid=${collectionId})}"
      method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <input type="hidden" name="_method" value="DELETE"/>
</form>
</th:block>

<th:block th:fragment="scripts">
<script th:inline="javascript">
    const collectionId = /*[[${collectionId}]]*/ '';

    function openCreateModal() {
        document.getElementById('modal-create-grammar').classList.remove('hidden');
    }
    function closeCreateModal() {
        document.getElementById('modal-create-grammar').classList.add('hidden');
    }
    function openEditModal(btn) {
        const id = btn.getAttribute('data-id');
        const word = btn.getAttribute('data-word');
        const meaning = btn.getAttribute('data-meaning');
        document.getElementById('edit-g-word').value = word;
        document.getElementById('edit-g-meaning').value = meaning;
        document.getElementById('edit-g-example').value = '';
        document.getElementById('edit-grammar-form').action = '/collections/' + collectionId + '/grammars/' + id;
        document.getElementById('modal-edit-grammar').classList.remove('hidden');
    }
    function closeEditModal() {
        document.getElementById('modal-edit-grammar').classList.add('hidden');
    }
    function confirmDelete(btn) {
        const id = btn.getAttribute('data-id');
        const word = btn.getAttribute('data-word');
        if (confirm('Delete grammar entry "' + word + '"?')) {
            const form = document.getElementById('delete-grammar-form');
            form.action = '/collections/' + collectionId + '/grammars/' + id;
            form.submit();
        }
    }
    // Close modals on backdrop click
    ['modal-create-grammar', 'modal-edit-grammar'].forEach(function(id) {
        document.getElementById(id).addEventListener('click', function(e) {
            if (e.target === this) this.classList.add('hidden');
        });
    });
</script>
</th:block>
</html>
