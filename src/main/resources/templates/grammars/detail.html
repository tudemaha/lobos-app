<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout}">

<title th:text="${grammar != null} ? ${grammar.word} + ' — Lobos' : 'Grammar Detail — Lobos'">Grammar Detail — Lobos</title>

<th:block th:fragment="head-extra"></th:block>

<th:block th:fragment="main-content">
<div class="max-w-2xl mx-auto px-4 sm:px-6 py-10">

    <!-- Breadcrumb -->
    <nav class="text-sm text-gray-400 mb-6">
        <a th:href="@{/collections}" class="hover:text-gray-600 transition">Collections</a>
        <span class="mx-2">/</span>
        <a th:href="@{/collections/{cid}/grammars(cid=${collectionId})}"
           class="hover:text-gray-600 transition"
           th:text="${collectionName ?: 'Grammars'}">Collection</a>
        <span class="mx-2">/</span>
        <span class="text-gray-700 font-medium" th:text="${grammar != null} ? ${grammar.word} : 'Detail'">Word</span>
    </nav>

    <!-- Flash messages -->
    <div th:if="${successMessage}" class="mb-5 bg-green-50 border border-green-200 rounded-md px-4 py-3 text-sm text-green-700">
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="mb-5 bg-red-50 border border-red-200 rounded-md px-4 py-3 text-sm text-red-600">
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- Grammar Card -->
    <div th:if="${grammar != null}"
         class="bg-white border border-gray-200 rounded-2xl p-7 shadow-sm">

        <!-- Header: word + star + actions -->
        <div class="flex items-start justify-between gap-4 mb-6">
            <div class="flex items-center gap-3">
                <!-- Star toggle -->
                <form th:action="@{/collections/{cid}/grammars/{gid}(cid=${collectionId},gid=${grammar.id})}"
                      method="post" class="flex-shrink-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="_method" value="PATCH"/>
                    <button type="submit"
                            id="btn-detail-star"
                            class="focus:outline-none"
                            th:title="${grammar.starred} ? 'Remove from starred' : 'Add to starred'">
                        <svg class="w-6 h-6 transition"
                             th:classappend="${grammar.starred} ? 'text-yellow-400 fill-yellow-400' : 'text-gray-300 fill-gray-200'"
                             viewBox="0 0 24 24">
                            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                        </svg>
                    </button>
                </form>

                <!-- Word -->
                <h1 class="text-3xl font-semibold text-gray-900 tracking-tight" th:text="${grammar.word}">Word</h1>
            </div>

            <!-- Edit / Delete actions -->
            <div class="flex items-center gap-2 flex-shrink-0">
                <button type="button"
                        id="btn-detail-edit"
                        onclick="openEditModal()"
                        class="flex items-center gap-1.5 px-3 py-1.5 rounded-md border border-gray-300 text-sm text-gray-600 hover:bg-gray-50 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M15.232 5.232l3.536 3.536M9 13l6.586-6.586a2 2 0 112.828 2.828L11.828 15.828a2 2 0 01-1.414.586H9v-1a2 2 0 01.586-1.414z"/>
                    </svg>
                    Edit
                </button>
                <button type="button"
                        id="btn-detail-delete"
                        onclick="confirmDelete()"
                        class="flex items-center gap-1.5 px-3 py-1.5 rounded-md border border-red-200 text-sm text-red-500 hover:bg-red-50 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M9 7V4h6v3M4 7h16"/>
                    </svg>
                    Delete
                </button>
            </div>
        </div>

        <!-- Divider -->
        <hr class="border-gray-100 mb-6" />

        <!-- Meaning -->
        <div class="mb-6">
            <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Meaning</h2>
            <p class="text-base text-gray-800 leading-relaxed whitespace-pre-line" th:text="${grammar.meaning}">meaning</p>
        </div>

        <!-- Example (if present) -->
        <div th:if="${grammar.example != null and !#strings.isEmpty(grammar.example)}">
            <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Example</h2>
            <blockquote class="border-l-4 border-[#70A3C9] pl-4 text-gray-700 italic leading-relaxed whitespace-pre-line"
                        th:text="${grammar.example}">example</blockquote>
        </div>

    </div>

    <!-- Not found -->
    <div th:if="${grammar == null}" class="text-center py-20 text-gray-400">
        <p class="text-base">Grammar entry not found.</p>
        <a th:href="@{/collections/{cid}/grammars(cid=${collectionId})}"
           class="mt-3 inline-block text-sm pastel-blue hover:underline">
            &larr; Back to collection
        </a>
    </div>

    <!-- Back link -->
    <div th:if="${grammar != null}" class="mt-6">
        <a th:href="@{/collections/{cid}/grammars(cid=${collectionId})}"
           class="text-sm text-gray-500 hover:text-gray-700 transition">
            &larr; Back to collection
        </a>
    </div>
</div>

<!-- ── EDIT GRAMMAR MODAL ── -->
<div id="modal-edit-grammar"
     class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/30 px-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6">
        <h2 class="text-xl font-semibold text-gray-900 mb-5">Edit Grammar Entry</h2>

        <form th:action="@{/collections/{cid}/grammars/{gid}(cid=${collectionId},gid=${grammar != null ? grammar.id : ''})}"
              method="post" class="space-y-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="_method" value="PUT"/>

            <!-- Word -->
            <div>
                <label for="edit-g-word" class="block text-sm font-medium text-gray-700 mb-1">Word <span class="text-red-400">*</span></label>
                <input id="edit-g-word"
                       type="text"
                       name="word"
                       required
                       maxlength="100"
                       th:value="${grammar != null ? grammar.word : ''}"
                       class="w-full border border-gray-300 rounded-md px-3 py-2 text-base text-gray-900 placeholder-gray-400 focus-pastel transition" />
            </div>

            <!-- Meaning -->
            <div>
                <label for="edit-g-meaning" class="block text-sm font-medium text-gray-700 mb-1">Meaning <span class="text-red-400">*</span></label>
                <textarea id="edit-g-meaning"
                          name="meaning"
                          required
                          rows="3"
                          th:text="${grammar != null ? grammar.meaning : ''}"
                          class="w-full border border-gray-300 rounded-md px-3 py-2 text-base text-gray-900 placeholder-gray-400 focus-pastel transition resize-none"></textarea>
            </div>

            <!-- Example -->
            <div>
                <label for="edit-g-example" class="block text-sm font-medium text-gray-700 mb-1">
                    Example <span class="text-gray-400 font-normal">(optional)</span>
                </label>
                <textarea id="edit-g-example"
                          name="example"
                          rows="2"
                          th:text="${grammar != null ? grammar.example : ''}"
                          class="w-full border border-gray-300 rounded-md px-3 py-2 text-base text-gray-900 placeholder-gray-400 focus-pastel transition resize-none"></textarea>
            </div>

            <div class="flex justify-end gap-3 pt-2">
                <button type="button" onclick="closeEditModal()" class="btn-outline">Cancel</button>
                <button type="submit" id="btn-edit-grammar-submit" class="btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<!-- DELETE form -->
<form id="delete-grammar-form"
      th:action="@{/collections/{cid}/grammars/{gid}(cid=${collectionId},gid=${grammar != null ? grammar.id : ''})}"
      method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <input type="hidden" name="_method" value="DELETE"/>
</form>
</th:block>

<th:block th:fragment="scripts">
<script>
    function openEditModal() {
        document.getElementById('modal-edit-grammar').classList.remove('hidden');
    }
    function closeEditModal() {
        document.getElementById('modal-edit-grammar').classList.add('hidden');
    }
    function confirmDelete() {
        if (confirm('Delete this grammar entry? This action cannot be undone.')) {
            document.getElementById('delete-grammar-form').submit();
        }
    }
    document.getElementById('modal-edit-grammar').addEventListener('click', function(e) {
        if (e.target === this) this.classList.add('hidden');
    });
</script>
</th:block>
</html>
